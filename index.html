<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏠 租房对比助手</title>
  <style>
    :root {
      --primary: #4F7EFF;
      --primary-light: #EEF3FF;
      --accent: #FF6B6B;
      --success: #52C41A;
      --warning: #FAAD14;
      --bg: #F5F7FA;
      --card: #FFFFFF;
      --border: #E8ECF0;
      --text: #1A202C;
      --text-muted: #8A94A6;
      --radius: 12px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --shadow-hover: 0 8px 24px rgba(79,126,255,0.16);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    .header {
      background: linear-gradient(135deg, #4F7EFF 0%, #6C5CE7 100%);
      color: #fff;
      padding: 20px 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(79,126,255,0.3);
    }
    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.5px; }
    .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      padding: 8px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: #fff; color: var(--primary); }
    .btn-primary:hover { background: #f0f4ff; transform: translateY(-1px); }
    .btn-ghost { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); }
    .btn-ghost:hover { background: rgba(255,255,255,0.25); }
    .btn-danger { background: var(--accent); color: #fff; }
    .btn-danger:hover { background: #ff5252; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { background: #3daf12; }

    /* ===== TABS ===== */
    .tabs {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 68px;
      z-index: 90;
    }
    .tabs-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 0;
    }
    .tab {
      padding: 14px 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-muted);
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tab:hover { color: var(--primary); }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    /* ===== MAIN CONTENT ===== */
    .main { max-width: 1200px; margin: 0 auto; padding: 24px; }
    .page { display: none; }
    .page.active { display: block; }

    /* ===== HOUSE LIST ===== */
    .list-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .list-header h2 { font-size: 18px; font-weight: 600; }
    .house-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }
    .house-card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: all 0.25s;
      border: 2px solid transparent;
      cursor: pointer;
    }
    .house-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
      border-color: var(--primary-light);
    }
    .house-card.selected { border-color: var(--primary); }
    .card-top {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px 20px 14px;
      color: #fff;
      position: relative;
    }
    .card-top-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
    }
    .icon-btn {
      width: 30px; height: 30px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      background: rgba(255,255,255,0.2);
      color: #fff;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.35); }
    .icon-btn.danger:hover { background: var(--accent); }
    .card-name { font-size: 17px; font-weight: 700; margin-bottom: 4px; padding-right: 72px; }
    .card-address { font-size: 12px; opacity: 0.85; }
    .card-body { padding: 16px 20px; }
    .card-metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 14px;
    }
    .metric { text-align: center; }
    .metric-val { font-size: 20px; font-weight: 700; color: var(--primary); line-height: 1; }
    .metric-val.accent { color: var(--accent); }
    .metric-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .score-bar-wrap { margin-bottom: 10px; }
    .score-bar-label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
    .score-bar-label span:last-child { color: var(--primary); font-weight: 600; }
    .score-bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; }
    .score-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--primary), #6C5CE7); transition: width 0.4s; }
    .card-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .tag {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }
    .tag-green { background: #f0fdf4; color: #15803d; }
    .tag-blue { background: #eff6ff; color: #1d4ed8; }
    .tag-orange { background: #fff7ed; color: #c2410c; }
    .tag-purple { background: #faf5ff; color: #7c3aed; }
    .tag-gray { background: #f9fafb; color: #6b7280; }
    .card-note { font-size: 12px; color: var(--text-muted); margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; line-height: 1.5; }
    .card-links { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; }
    .card-link-btn { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 500; text-decoration: none; transition: all 0.2s; }
    .card-link-btn.source { background: #eff6ff; color: #1d4ed8; }
    .card-link-btn.source:hover { background: #dbeafe; }
    .card-link-btn.video { background: #fff1f0; color: #c53030; }
    .card-link-btn.video:hover { background: #ffe4e4; }
    /* video list in modal */
    .video-list { display: flex; flex-direction: column; gap: 8px; }
    .video-item { display: flex; gap: 8px; align-items: center; }
    .video-item input { flex: 1; padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; color: var(--text); }
    .video-item input:focus { outline: none; border-color: var(--primary); }
    .video-remove { width: 28px; height: 28px; border-radius: 6px; border: none; background: #fff1f0; color: #c53030; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .video-remove:hover { background: #ffe4e4; }
    .btn-add-video { margin-top: 8px; padding: 7px 14px; border-radius: 8px; border: 1.5px dashed var(--primary); background: var(--primary-light); color: var(--primary); font-size: 13px; cursor: pointer; font-weight: 500; transition: all 0.2s; }
    .btn-add-video:hover { background: #dce8ff; }
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state p { font-size: 16px; margin-bottom: 24px; }
    .compare-check {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 12px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .compare-check input { cursor: pointer; accent-color: var(--primary); }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      animation: modalIn 0.25s ease;
    }
    @keyframes modalIn {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-header h3 { font-size: 18px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-muted); padding: 4px; }
    .modal-body { padding: 20px 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }
    .btn-outline { background: none; border: 2px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .form-section { margin-bottom: 24px; }
    .form-section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: span 2; }
    .form-group label { font-size: 13px; font-weight: 500; color: var(--text); }
    .form-group input, .form-group select, .form-group textarea {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .star-rating { display: flex; gap: 6px; align-items: center; }
    .star {
      font-size: 22px;
      cursor: pointer;
      color: #ddd;
      transition: color 0.15s, transform 0.1s;
      user-select: none;
    }
    .star.active { color: #FAAD14; }
    .star:hover { transform: scale(1.15); }
    .appliance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .appliance-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
    }
    .appliance-item:hover { border-color: var(--primary); }
    .appliance-item.checked { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 500; }
    .appliance-item input { accent-color: var(--primary); }
    .condition-select { display: flex; gap: 8px; flex-wrap: wrap; }
    .condition-opt {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }
    .condition-opt:hover { border-color: var(--primary); }
    .condition-opt.active { background: var(--primary); color: #fff; border-color: var(--primary); }

    /* ===== COMPARE PAGE ===== */
    .compare-hint {
      background: var(--primary-light);
      border: 1px solid #c7d9ff;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 14px;
      color: var(--primary);
      margin-bottom: 20px;
    }
    .compare-table-wrap { overflow-x: auto; }
    .compare-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .compare-table th, .compare-table td {
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .compare-table thead th {
      background: linear-gradient(135deg, #4F7EFF, #6C5CE7);
      color: #fff;
      font-weight: 600;
    }
    .compare-table thead th:first-child { background: #5a6272; }
    .compare-table tbody tr:hover td { background: #f8faff; }
    .compare-table tbody tr:last-child td { border-bottom: none; }
    .compare-table .row-label {
      font-weight: 500;
      color: var(--text-muted);
      background: #f9fafb;
      white-space: nowrap;
    }
    .compare-table .best { color: var(--success); font-weight: 700; }
    .compare-table .worst { color: var(--accent); }
    .stars-display { color: #FAAD14; letter-spacing: 2px; }

    /* ===== SCORE SUMMARY ===== */
    .score-summary {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px 24px;
      margin-bottom: 24px;
    }
    .score-summary h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .score-items { display: flex; gap: 16px; flex-wrap: wrap; }
    .score-item {
      flex: 1;
      min-width: 140px;
      background: var(--bg);
      border-radius: 10px;
      padding: 14px;
      text-align: center;
    }
    .score-item-val {
      font-size: 32px;
      font-weight: 800;
      color: var(--primary);
      line-height: 1;
    }
    .score-item-name { font-size: 13px; color: var(--text-muted); margin-top: 6px; }
    .score-item-rank {
      display: inline-block;
      margin-top: 6px;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 600;
    }
    .score-item-rank.no1 { background: #fff8e1; color: #f59e0b; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 12px 20px;
      background: #1a202c;
      color: #fff;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      z-index: 9999;
      transform: translateY(20px);
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #166534; }
    .toast.error { background: #991b1b; }

    /* ===== VIDEO PREVIEW MODAL ===== */
    .video-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
      flex-direction: column;
      gap: 16px;
    }
    .video-modal-overlay.open { display: flex; }
    .video-modal-title {
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }
    .video-modal-wrap {
      width: 100%;
      max-width: 900px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      background: #000;
      position: relative;
    }
    .video-modal-wrap video, .video-modal-wrap iframe {
      width: 100%;
      display: block;
    }
    .video-modal-wrap iframe { min-height: 400px; }
    .video-modal-close {
      position: absolute;
      top: 12px;
      right: 14px;
      width: 34px; height: 34px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      transition: background 0.2s;
    }
    .video-modal-close:hover { background: rgba(0,0,0,0.85); }
    .video-list-picker {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
    }
    .video-pick-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.1);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .video-pick-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.6); }
    .video-pick-btn.active { background: var(--primary); border-color: var(--primary); }
    .video-error {
      color: #ff9999;
      font-size: 14px;
      text-align: center;
      padding: 40px;
    }
    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: span 1; }
      .appliance-grid { grid-template-columns: repeat(2, 1fr); }
      .card-metrics { grid-template-columns: repeat(3, 1fr); }
      .main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <h1>🏠 租房对比助手</h1>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="openAddModal()">＋ 添加房源</button>
      <button class="btn btn-ghost" onclick="exportData()">📤 导出</button>
      <button class="btn btn-ghost" onclick="importData()">📥 导入</button>
      <input type="file" id="importInput" accept=".json" style="display:none" onchange="handleImport(event)" />
    </div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tabs-inner">
    <div class="tab active" onclick="switchTab('list')">📋 房源列表</div>
    <div class="tab" onclick="switchTab('compare')">⚖️ 横向对比</div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LIST PAGE -->
  <div id="page-list" class="page active">
    <div class="list-header">
      <h2 id="list-count">共 0 套房源</h2>
      <div style="display:flex;gap:10px;align-items:center;">
        <select id="sortSelect" onchange="renderList()" style="padding:7px 12px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;color:var(--text);cursor:pointer;">
          <option value="time">按添加时间</option>
          <option value="score">按综合评分↓</option>
          <option value="rent">按租金↑</option>
          <option value="metro">按地铁距离↑</option>
        </select>
      </div>
    </div>
    <div id="houseGrid" class="house-grid"></div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="empty-icon">🏡</div>
      <p>还没有添加任何房源</p>
      <button class="btn btn-primary" style="background:var(--primary);color:#fff;" onclick="openAddModal()">＋ 添加第一套房源</button>
    </div>
  </div>

  <!-- COMPARE PAGE -->
  <div id="page-compare" class="page">
    <div class="compare-hint">💡 在房源列表中勾选想要对比的房源（最多 4 套），即可在此查看详细横向对比</div>
    <div id="scoreRanking"></div>
    <div class="compare-table-wrap">
      <div id="compareTable"></div>
    </div>
  </div>

</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">添加房源</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">

      <!-- 基本信息 -->
      <div class="form-section">
        <div class="form-section-title">🏷️ 基本信息</div>
        <div class="form-grid">
          <div class="form-group full">
            <label>房源名称 *</label>
            <input type="text" id="f-name" placeholder="例如：朝阳望京二居室" />
          </div>
          <div class="form-group full">
            <label>详细地址</label>
            <input type="text" id="f-address" placeholder="小区名 / 楼栋" />
          </div>
        </div>
      </div>

      <!-- 租金费用 -->
      <div class="form-section">
        <div class="form-section-title">💰 租金费用</div>
        <div class="form-grid">
          <div class="form-group">
            <label>月租金（元）</label>
            <input type="number" id="f-rent" placeholder="例如：4500" min="0" />
          </div>
          <div class="form-group">
            <label>押金（月）</label>
            <input type="number" id="f-deposit" placeholder="例如：1" min="0" step="0.5" />
          </div>
          <div class="form-group">
            <label>中介费（元）</label>
            <input type="number" id="f-agency" placeholder="例如：4500" min="0" />
          </div>
          <div class="form-group">
            <label>物业费（元/月）</label>
            <input type="number" id="f-property-fee" placeholder="例如：200" min="0" />
          </div>
        </div>
      </div>

<script>
// ============================================================
// STATE
// ============================================================
const STORAGE_KEY = 'rental_houses_v2';
let houses = [];
let editingId = null;
let stars = { traffic: 0, appliance: 0, light: 0, around: 0, green: 0, landlord: 0, overall: 0 };

// ============================================================
// LOAD / SAVE
// ============================================================
function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    houses = raw ? JSON.parse(raw) : [];
  } catch(e) { houses = []; }
}
function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(houses));
}
function genId() { return 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

// ============================================================
// TABS
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', (i===0 && tab==='list') || (i===1 && tab==='compare'));
  });
  document.getElementById('page-list').classList.toggle('active', tab==='list');
  document.getElementById('page-compare').classList.toggle('active', tab==='compare');
  if (tab === 'compare') renderCompare();
}

// ============================================================
// RENDER LIST
// ============================================================
function renderList() {
  const grid = document.getElementById('houseGrid');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('list-count');
  const sort = document.getElementById('sortSelect').value;

  let sorted = [...houses];
  if (sort === 'score') sorted.sort((a,b) => calcScore(b) - calcScore(a));
  else if (sort === 'rent') sorted.sort((a,b) => (a.rent||999999) - (b.rent||999999));
  else if (sort === 'metro') sorted.sort((a,b) => (a.metro||999) - (b.metro||999));
  else sorted.sort((a,b) => b.createdAt - a.createdAt);

  countEl.textContent = `共 ${houses.length} 套房源`;
  if (!houses.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  grid.innerHTML = sorted.map(h => renderCard(h)).join('');
}

function calcScore(h) {
  let s = 0, w = 0;
  const add = (val, weight) => { if (val) { s += val * weight; w += weight; } };
  add(h.starOverall, 3);
  add(h.starTraffic, 2);
  add(h.starAppliance, 1.5);
  add(h.starLight, 1);
  add(h.starAround, 1.5);
  add(h.starGreen, 1);
  add(h.starLandlord, 1);
  return w ? parseFloat((s/w).toFixed(1)) : 0;
}

function renderCard(h) {
  const score = calcScore(h);
  const scoreWidth = (score / 5 * 100).toFixed(0);
  const appliances = (h.appliances || []).slice(0,4);
  const appStr = appliances.length ? appliances.join('、') + (h.appliances.length > 4 ? `等${h.appliances.length}件` : '') : '未记录';
  const rent = h.rent ? `¥${Number(h.rent).toLocaleString()}` : '–';
  const metro = h.metro ? `${h.metro}分钟` : '–';
  const area = h.area ? `${h.area}㎡` : '–';

  let tags = [];
  if (h.direction) tags.push({text: h.direction, cls: 'tag-blue'});
  if (h.layout) tags.push({text: h.layout, cls: 'tag-purple'});
  if (h.noise === '非常安静' || h.noise === '较安静') tags.push({text: '安静', cls: 'tag-green'});
  if (h.pet === '可以') tags.push({text: '可养宠', cls: 'tag-orange'});
  if (h.condition && h.condition.includes('全新')) tags.push({text: '全新装修', cls: 'tag-green'});

  const checked = getCompareSelected().includes(h.id);

  return `
  <div class="house-card${checked ? ' selected' : ''}" id="card-${h.id}">
    <div class="card-top">
      <div class="card-top-actions">
        <button class="icon-btn" onclick="event.stopPropagation();openEditModal('${h.id}')" title="编辑">✏️</button>
        <button class="icon-btn danger" onclick="event.stopPropagation();deleteHouse('${h.id}')" title="删除">🗑️</button>
      </div>
      <div class="card-name">${h.name || '未命名房源'}</div>
      <div class="card-address">${h.address || '地址未填写'}</div>
    </div>
    <div class="card-body">
      <div class="card-metrics">
        <div class="metric">
          <div class="metric-val accent">${rent}</div>
          <div class="metric-label">月租金</div>
        </div>
        <div class="metric">
          <div class="metric-val">${area}</div>
          <div class="metric-label">面积</div>
        </div>
        <div class="metric">
          <div class="metric-val">${metro}</div>
          <div class="metric-label">地铁步行</div>
        </div>
      </div>
      <div class="score-bar-wrap">
        <div class="score-bar-label">
          <span>综合评分</span>
          <span>${score > 0 ? score + ' / 5.0' : '暂无评分'}</span>
        </div>
        <div class="score-bar">
          <div class="score-bar-fill" style="width:${scoreWidth}%"></div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">🔌 ${appStr}</div>
      ${tags.length ? `<div class="card-tags">${tags.map(t=>`<span class="tag ${t.cls}">${t.text}</span>`).join('')}</div>` : ''}
      ${h.note ? `<div class="card-note">📝 ${h.note.slice(0,60)}${h.note.length>60?'…':''}</div>` : ''}
      ${(h.sourceUrl || (h.videos && h.videos.length)) ? `
      <div class="card-links">
        ${h.sourceUrl ? `<a class="card-link-btn source" href="${h.sourceUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🏠 房源链接</a>` : ''}
        ${(h.videos || []).map((v,i) => `<button class="card-link-btn video" onclick="event.stopPropagation();openVideoModal('${h.name || ''}', ${JSON.stringify(h.videos||[]).replace(/"/g,'&quot;')}, ${i})">🎬 视频${i+1}</button>`).join('')}
      </div>` : ''}
      <div class="compare-check">
        <input type="checkbox" id="cmp-${h.id}" ${checked ? 'checked' : ''} onchange="toggleCompare('${h.id}', this.checked)" />
        <label for="cmp-${h.id}" style="cursor:pointer;">加入对比</label>
      </div>
    </div>
  </div>`;
}

// ============================================================
// COMPARE
// ============================================================
function getCompareSelected() {
  try { return JSON.parse(localStorage.getItem('compare_selected') || '[]'); } catch(e) { return []; }
}
function setCompareSelected(ids) {
  localStorage.setItem('compare_selected', JSON.stringify(ids));
}
function toggleCompare(id, checked) {
  let sel = getCompareSelected();
  if (checked) {
    if (sel.length >= 4) { showToast('最多只能对比 4 套房源', 'error'); document.getElementById('cmp-'+id).checked = false; return; }
    if (!sel.includes(id)) sel.push(id);
  } else {
    sel = sel.filter(x => x !== id);
  }
  setCompareSelected(sel);
  // update card border
  document.querySelectorAll('.house-card').forEach(c => c.classList.remove('selected'));
  sel.forEach(sid => { const c = document.getElementById('card-'+sid); if(c) c.classList.add('selected'); });
}

function renderCompare() {
  const sel = getCompareSelected();
  const selected = sel.map(id => houses.find(h => h.id === id)).filter(Boolean);
  const rankEl = document.getElementById('scoreRanking');
  const tableEl = document.getElementById('compareTable');

  if (!selected.length) {
    rankEl.innerHTML = '';
    tableEl.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text-muted);font-size:15px;">🏠 请先在房源列表中勾选要对比的房源</div>';
    return;
  }

  // Score ranking
  const scored = selected.map(h => ({ h, score: calcScore(h) })).sort((a,b) => b.score - a.score);
  rankEl.innerHTML = `
    <div class="score-summary">
      <h3>📊 综合评分排行</h3>
      <div class="score-items">
        ${scored.map((item, i) => `
          <div class="score-item">
            <div class="score-item-val">${item.score || '–'}</div>
            <div class="score-item-name">${item.h.name || '未命名'}</div>
            <div class="score-item-rank ${i===0?'no1':''}">第 ${i+1} 名</div>
          </div>
        `).join('')}
      </div>
    </div>`;

  // Compare table
  const rows = [
    { label: '📍 地址', key: h => h.address || '–' },
    { label: '💰 月租金', key: h => h.rent ? `¥${Number(h.rent).toLocaleString()}` : '–', compare: 'rent', numKey: 'rent', best: 'min' },
    { label: '💳 押金（月）', key: h => h.deposit ? `${h.deposit}个月` : '–' },
    { label: '🏢 中介费', key: h => h.agency ? `¥${Number(h.agency).toLocaleString()}` : '–', compare: 'agency', numKey: 'agency', best: 'min' },
    { label: '📐 面积', key: h => h.area ? `${h.area}㎡` : '–', compare: 'area', numKey: 'area', best: 'max' },
    { label: '🏠 户型', key: h => h.layout || '–' },
    { label: '🧭 朝向', key: h => h.direction || '–' },
    { label: '🏗️ 楼层', key: h => h.floor ? `${h.floor}/${h.totalFloor||'?'}层` : '–' },
    { label: '🔨 装修', key: h => h.condition || '–' },
    { label: '🚇 地铁步行', key: h => h.metro ? `${h.metro}分钟` : '–', compare: 'metro', numKey: 'metro', best: 'min' },
    { label: '🚇 地铁线路', key: h => h.metroLine || '–' },
    { label: '🏢 通勤时间', key: h => h.commute ? `${h.commute}分钟` : '–', compare: 'commute', numKey: 'commute', best: 'min' },
    { label: '🚦 交通便利', key: h => h.starTraffic ? '★'.repeat(h.starTraffic) + '☆'.repeat(5-h.starTraffic) : '–', starKey: 'starTraffic', best: 'max' },
    { label: '🔌 电器设施', key: h => (h.appliances||[]).join('、') || '–' },
    { label: '🛠️ 家电状况', key: h => h.starAppliance ? '★'.repeat(h.starAppliance) + '☆'.repeat(5-h.starAppliance) : '–', starKey: 'starAppliance', best: 'max' },
    { label: '☀️ 采光', key: h => h.starLight ? '★'.repeat(h.starLight) + '☆'.repeat(5-h.starLight) : '–', starKey: 'starLight', best: 'max' },
    { label: '🔇 噪音', key: h => h.noise || '–' },
    { label: '🛍️ 周边配套', key: h => h.starAround ? '★'.repeat(h.starAround) + '☆'.repeat(5-h.starAround) : '–', starKey: 'starAround', best: 'max' },
    { label: '🏪 距超市', key: h => h.supermarket ? `${h.supermarket}分钟` : '–', compare: 'supermarket', numKey: 'supermarket', best: 'min' },
    { label: '🍜 餐饮', key: h => h.dining || '–' },
    { label: '🏥 医疗', key: h => h.medical || '–' },
    { label: '🌿 小区绿化', key: h => h.starGreen ? '★'.repeat(h.starGreen) + '☆'.repeat(5-h.starGreen) : '–', starKey: 'starGreen', best: 'max' },
    { label: '🔐 安保', key: h => h.security || '–' },
    { label: '🚗 停车位', key: h => h.parking || '–' },
    { label: '🏢 楼龄', key: h => h.buildingAge ? `${h.buildingAge}年` : '–', compare: 'buildingAge', numKey: 'buildingAge', best: 'min' },
    { label: '🤝 房东印象', key: h => h.starLandlord ? '★'.repeat(h.starLandlord) + '☆'.repeat(5-h.starLandlord) : '–', starKey: 'starLandlord', best: 'max' },
    { label: '📅 最短租期', key: h => h.minLease ? `${h.minLease}个月` : '–' },
    { label: '🐾 养宠物', key: h => h.pet || '–' },
    { label: '🍳 允许做饭', key: h => h.cooking || '–' },
    { label: '⭐ 综合满意度', key: h => h.starOverall ? '★'.repeat(h.starOverall) + '☆'.repeat(5-h.starOverall) : '–', starKey: 'starOverall', best: 'max' },
    { label: '🔗 房源链接', key: h => h.sourceUrl ? `<a href="${h.sourceUrl}" target="_blank" rel="noopener" style="color:var(--primary)">查看</a>` : '–' },
    { label: '🎬 看房视频', key: h => (h.videos && h.videos.length) ? h.videos.map((v,i) => `<button onclick="openVideoModal('${(h.name||'').replace(/'/g,"\\'")}', ${JSON.stringify(h.videos||[]).replace(/"/g,'&quot;')}, ${i})" style="background:none;border:none;color:#c53030;cursor:pointer;font-size:13px;margin-right:6px;text-decoration:underline;padding:0">视频${i+1}</button>`).join('') : '–' },
    { label: '📝 备注', key: h => h.note || '–' },
  ];

  function getBestIdx(row) {
    if (row.numKey) {
      const vals = selected.map(h => parseFloat(h[row.numKey])).filter(v => !isNaN(v));
      if (!vals.length) return -1;
      const best = row.best === 'min' ? Math.min(...vals) : Math.max(...vals);
      return selected.findIndex(h => parseFloat(h[row.numKey]) === best && !isNaN(parseFloat(h[row.numKey])));
    }
    if (row.starKey) {
      const vals = selected.map(h => h[row.starKey] || 0);
      const best = Math.max(...vals);
      if (!best) return -1;
      return selected.findIndex(h => (h[row.starKey] || 0) === best);
    }
    return -1;
  }

  const theadCols = selected.map(h => `<th>${h.name || '未命名'}</th>`).join('');
  const tbodyRows = rows.map(row => {
    const bestIdx = getBestIdx(row);
    const cells = selected.map((h, i) => {
      const val = row.key(h);
      const isBest = bestIdx === i && val !== '–';
      return `<td class="${isBest ? (row.best === 'min' ? 'best' : 'best') : ''}">${val}</td>`;
    }).join('');
    return `<tr><td class="row-label">${row.label}</td>${cells}</tr>`;
  }).join('');

  tableEl.innerHTML = `
    <table class="compare-table">
      <thead><tr><th>对比项目</th>${theadCols}</tr></thead>
      <tbody>${tbodyRows}</tbody>
    </table>`;
}

// ============================================================
// MODAL
// ============================================================
function openAddModal() {
  editingId = null;
  stars = { traffic: 0, appliance: 0, light: 0, around: 0, green: 0, landlord: 0, overall: 0 };
  document.getElementById('modalTitle').textContent = '添加房源';
  clearForm();
  document.getElementById('modalOverlay').classList.add('open');
}
function openEditModal(id) {
  const h = houses.find(x => x.id === id);
  if (!h) return;
  editingId = id;
  stars = {
    traffic: h.starTraffic || 0,
    appliance: h.starAppliance || 0,
    light: h.starLight || 0,
    around: h.starAround || 0,
    green: h.starGreen || 0,
    landlord: h.starLandlord || 0,
    overall: h.starOverall || 0,
  };
  document.getElementById('modalTitle').textContent = '编辑房源';
  fillForm(h);
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function clearForm() {
  const ids = ['f-name','f-address','f-rent','f-deposit','f-agency','f-property-fee',
    'f-area','f-layout','f-floor','f-total-floor','f-direction','f-condition',
    'f-metro','f-metro-line','f-commute','f-noise','f-supermarket','f-dining',
    'f-medical','f-security','f-parking','f-building-age','f-min-lease',
    'f-pet','f-cooking','f-noise','f-note','f-source-url'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  // clear video list
  document.getElementById('videoList').innerHTML = '';
  document.querySelectorAll('#applianceGrid input[type=checkbox]').forEach(cb => {
    cb.checked = false;
    cb.closest('.appliance-item').classList.remove('checked');
  });
  Object.keys(stars).forEach(k => { stars[k] = 0; updateStarUI(k); });
}

function fillForm(h) {
  const set = (id, val) => { const el = document.getElementById(id); if(el && val !== undefined) el.value = val || ''; };
  set('f-name', h.name); set('f-address', h.address);
  set('f-rent', h.rent); set('f-deposit', h.deposit); set('f-agency', h.agency); set('f-property-fee', h.propertyFee);
  set('f-area', h.area); set('f-layout', h.layout); set('f-floor', h.floor); set('f-total-floor', h.totalFloor);
  set('f-direction', h.direction); set('f-condition', h.condition);
  set('f-metro', h.metro); set('f-metro-line', h.metroLine); set('f-commute', h.commute);
  set('f-noise', h.noise); set('f-supermarket', h.supermarket); set('f-dining', h.dining);
  set('f-medical', h.medical); set('f-security', h.security); set('f-parking', h.parking);
  set('f-building-age', h.buildingAge); set('f-min-lease', h.minLease);
  set('f-pet', h.pet); set('f-cooking', h.cooking); set('f-note', h.note);
  set('f-source-url', h.sourceUrl);
  // fill video list
  document.getElementById('videoList').innerHTML = '';
  (h.videos || []).forEach(v => addVideoInput(v));

  // appliances
  document.querySelectorAll('#applianceGrid input[type=checkbox]').forEach(cb => {
    const has = (h.appliances || []).includes(cb.value);
    cb.checked = has;
    cb.closest('.appliance-item').classList.toggle('checked', has);
  });

  // stars
  Object.keys(stars).forEach(k => updateStarUI(k));
}

function saveHouse() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showToast('请填写房源名称', 'error'); return; }

  const getNum = id => { const v = document.getElementById(id).value; return v ? parseFloat(v) : null; };
  const getStr = id => document.getElementById(id).value.trim() || null;

  const appliances = [];
  document.querySelectorAll('#applianceGrid input[type=checkbox]:checked').forEach(cb => appliances.push(cb.value));

  const h = {
    id: editingId || genId(),
    createdAt: editingId ? (houses.find(x=>x.id===editingId)?.createdAt || Date.now()) : Date.now(),
    name, address: getStr('f-address'),
    rent: getNum('f-rent'), deposit: getNum('f-deposit'), agency: getNum('f-agency'), propertyFee: getNum('f-property-fee'),
    area: getNum('f-area'), layout: getStr('f-layout'), floor: getNum('f-floor'), totalFloor: getNum('f-total-floor'),
    direction: getStr('f-direction'), condition: getStr('f-condition'),
    metro: getNum('f-metro'), metroLine: getStr('f-metro-line'), commute: getNum('f-commute'),
    noise: getStr('f-noise'), supermarket: getNum('f-supermarket'), dining: getStr('f-dining'),
    medical: getStr('f-medical'), security: getStr('f-security'), parking: getStr('f-parking'),
    buildingAge: getNum('f-building-age'), minLease: getNum('f-min-lease'),
    pet: getStr('f-pet'), cooking: getStr('f-cooking'), note: getStr('f-note'),
    sourceUrl: getStr('f-source-url'),
    videos: Array.from(document.querySelectorAll('#videoList .video-item input')).map(i => i.value.trim()).filter(Boolean),
    appliances,
    starTraffic: stars.traffic, starAppliance: stars.appliance, starLight: stars.light,
    starAround: stars.around, starGreen: stars.green, starLandlord: stars.landlord, starOverall: stars.overall,
  };

  if (editingId) {
    const idx = houses.findIndex(x => x.id === editingId);
    if (idx >= 0) houses[idx] = h;
  } else {
    houses.push(h);
  }
  saveData();
  closeModal();
  renderList();
  showToast(editingId ? '房源已更新 ✅' : '房源已添加 ✅', 'success');
}

function deleteHouse(id) {
  if (!confirm('确定删除这套房源吗？')) return;
  houses = houses.filter(h => h.id !== id);
  // remove from compare
  let sel = getCompareSelected().filter(x => x !== id);
  setCompareSelected(sel);
  saveData();
  renderList();
  showToast('已删除');
}

// ============================================================
// STAR RATING
// ============================================================
function setStar(type, val) {
  stars[type] = val;
  updateStarUI(type);
}
function updateStarUI(type) {
  const map = {
    traffic: 'sr-traffic', appliance: 'sr-appliance', light: 'sr-light',
    around: 'sr-around', green: 'sr-green', landlord: 'sr-landlord', overall: 'sr-overall',
  };
  const container = document.getElementById(map[type]);
  if (!container) return;
  container.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.val) <= stars[type]);
  });
}

// ============================================================
// APPLIANCE TOGGLE
// ============================================================
function toggleAppliance(label) {
  const cb = label.querySelector('input[type=checkbox]');
  // The click event is handled by the browser toggling the checkbox
  // We just update the class on next tick
  setTimeout(() => {
    label.classList.toggle('checked', cb.checked);
  }, 0);
}

// ============================================================
// EXPORT / IMPORT
// ============================================================
function exportData() {
  if (!houses.length) { showToast('暂无房源数据', 'error'); return; }
  const blob = new Blob([JSON.stringify(houses, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `rental_data_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('数据已导出 📤');
}
function importData() { document.getElementById('importInput').click(); }
function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) throw new Error('格式错误');
      if (!confirm(`导入 ${data.length} 条房源记录，是否合并到现有数据？（取消则覆盖）`)) {
        houses = data;
      } else {
        const ids = new Set(houses.map(h => h.id));
        data.forEach(h => { if (!ids.has(h.id)) houses.push(h); });
      }
      saveData();
      renderList();
      showToast(`成功导入 ${data.length} 套房源 ✅`, 'success');
    } catch(err) {
      showToast('导入失败：文件格式不正确', 'error');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ============================================================
// TOAST
// ============================================================
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ============================================================
// CLOSE MODAL ON OVERLAY CLICK
// ============================================================
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('videoModal').addEventListener('click', function(e) {
  if (e.target === this) closeVideoModal();
});

// ============================================================
// VIDEO PREVIEW MODAL
// ============================================================
function openVideoModal(houseName, videos, startIdx = 0) {
  const modal = document.getElementById('videoModal');
  const titleEl = document.getElementById('videoModalTitle');
  const wrapEl = document.getElementById('videoWrap');
  const pickerEl = document.getElementById('videoPicker');

  titleEl.textContent = houseName ? `📹 ${houseName} — 看房视频` : '📹 看房视频';
  wrapEl.querySelector('.video-modal-close').onclick = closeVideoModal;

  // Video picker tabs (if multiple)
  if (videos && videos.length > 1) {
    pickerEl.innerHTML = videos.map((v, i) =>
      `<button class="video-pick-btn${i === startIdx ? ' active' : ''}" onclick="renderVideo('${v.replace(/'/g,"\\'")}', ${i})">🎬 视频${i+1}</button>`
    ).join('');
    pickerEl.style.display = 'flex';
  } else {
    pickerEl.style.display = 'none';
  }

  modal.classList.add('open');
  renderVideo(videos[startIdx], startIdx);
}

function renderVideo(url, idx) {
  const contentEl = document.getElementById('videoContent');
  // Update active tab
  document.querySelectorAll('.video-pick-btn').forEach((b, i) => {
    b.classList.toggle('active', i === idx);
  });

  if (!url) {
    contentEl.innerHTML = '<div class="video-error">⚠️ 链接为空</div>';
    return;
  }

  const lower = url.toLowerCase();

  // Direct video file
  if (/\.(mp4|webm|mov|avi|mkv)(\?|$)/i.test(lower)) {
    contentEl.innerHTML = `<video controls autoplay style="max-height:70vh"><source src="${url}" />您的浏览器不支持视频播放</video>`;
    return;
  }

  // YouTube
  const ytMatch = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if (ytMatch) {
    contentEl.innerHTML = `<iframe src="https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="height:500px;border:none"></iframe>`;
    return;
  }

  // Bilibili
  const bvMatch = url.match(/bilibili\.com\/video\/([a-zA-Z0-9]+)/);
  if (bvMatch) {
    contentEl.innerHTML = `<iframe src="https://player.bilibili.com/player.html?bvid=${bvMatch[1]}&autoplay=1" allow="autoplay; fullscreen" style="height:500px;border:none"></iframe>`;
    return;
  }

  // Douyin
  if (url.includes('douyin.com') || url.includes('v.douyin.com')) {
    const idMatch = url.match(/video\/(\d+)/) || url.match(/v\.douyin\.com\/([a-zA-Z0-9]+)/);
    const embedId = idMatch ? idMatch[1] : encodeURIComponent(url);
    contentEl.innerHTML = `<iframe src="https://www.iesdouyin.com/share/video/${embedId}/" allow="autoplay; fullscreen" style="height:500px;border:none"></iframe>`;
    return;
  }

  // WeChat video / others — try as iframe
  contentEl.innerHTML = `<div style="background:#000;height:500px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
    <div style="color:#888;font-size:14px;text-align:center;padding:0 20px;">无法直接播放此链接，将尝试在新窗口打开</div>
    <button onclick="window.open('${url.replace(/'/g,"\\'")}','_blank')" style="padding:10px 24px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">👉 在新窗口打开</button>
  </div>`;
}

function closeVideoModal() {
  document.getElementById('videoModal').classList.remove('open');
  document.getElementById('videoContent').innerHTML = '';
}

// ============================================================
// VIDEO INPUT
// ============================================================
function addVideoInput(val = '') {
  const list = document.getElementById('videoList');
  const item = document.createElement('div');
  item.className = 'video-item';
  item.innerHTML = `<input type="url" placeholder="https://... （支持任意视频链接）" value="${val.replace(/"/g,'&quot;')}" /><button class="video-remove" type="button" onclick="this.parentElement.remove()" title="删除">✕</button>`;
  list.appendChild(item);
}

// ============================================================
// INIT
// ============================================================
loadData();
renderList();
</script>
